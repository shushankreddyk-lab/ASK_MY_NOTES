<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskMyNotes</title>
</head>
<body>

    <h1>AskMyNotes</h1>
    <p>Upload your notes and ask questions from them.</p>

    <h2>Upload Notes</h2>
    <p>
        <label for="notes-file">Choose your notes file:</label>
        <input type="file" id="notes-file" name="notes-file">
    </p>

    <h2>Ask a Question</h2>
    <p>
        <label for="question">Enter your question:</label><br>
        <textarea id="question" name="question" rows="4" cols="50"></textarea>
    </p>
    <button type="button">Ask My Notes</button>

    <h2>Answer</h2>
    <p>Your AI-generated answer will appear here.</p>

    <br>
    <p>AskMyNotes Capstone Project</p>

</body>
</html>
